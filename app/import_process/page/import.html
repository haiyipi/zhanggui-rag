<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>知识库导入工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s ease; background: #fafafa; }
        .upload-area:hover { border-color: #667eea; background: #f5f5ff; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        .upload-text { color: #666; margin-bottom: 10px; }
        .upload-hint { color: #999; font-size: 12px; }
        input[type="file"] { display: none; }
        .file-list { margin-top: 20px; }
        .file-item { background: #f5f5f5; border-radius: 8px; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .file-name { font-size: 14px; color: #333; }
        .file-size { font-size: 12px; color: #999; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .task-list { margin-top: 20px; }
        .task-item { background: #f9f9f9; border-radius: 8px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .task-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .task-name { font-weight: 500; color: #333; }
        .task-status { font-size: 12px; padding: 2px 8px; border-radius: 12px; }
        .status-pending { background: #ffc107; color: #333; }
        .status-processing { background: #17a2b8; color: white; }
        .status-completed { background: #28a745; color: white; }
        .status-failed { background: #dc3545; color: white; }
        .task-progress { font-size: 12px; color: #666; margin-bottom: 5px; }
        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0%; transition: width 0.3s; }
        .log-panel { background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; margin-top: 15px; display: none; }
        .log-line { padding: 2px 0; border-bottom: 1px solid #333; }
        .log-time { color: #858585; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>知识库导入工具</h1>
                <p>支持 PDF / Markdown 文件，自动解析并存入向量数据库</p>
            </div>
            <div class="content">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击或拖拽文件到此处上传</div>
                    <div class="upload-hint">支持 .pdf 和 .md 文件，可多选</div>
                </div>
                <input type="file" id="fileInput" multiple accept=".pdf,.md">
                <div class="file-list" id="fileList"></div>
                <button class="btn" id="uploadBtn" disabled>开始上传</button>
                <div class="task-list" id="taskList"></div>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = 'http://127.0.0.1:8002';
        let selectedFiles = [];
        let pollingIntervals = {};
        const tasks = {};
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');
        const taskList = document.getElementById('taskList');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            addFiles(Array.from(e.dataTransfer.files));
        });
        
        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
            fileInput.value = '';
        });
        
        function addFiles(files) {
            for (const file of files) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext !== 'pdf' && ext !== 'md') {
                    alert('不支持的文件类型: ' + file.name);
                    continue;
                }
                if (!selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                }
            }
            renderFileList();
            uploadBtn.disabled = selectedFiles.length === 0;
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
            uploadBtn.disabled = selectedFiles.length === 0;
        }
        
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }
            fileList.innerHTML = selectedFiles.map((file, i) => `
                <div class="file-item">
                    <div><div class="file-name">${escapeHtml(file.name)}</div><div class="file-size">${formatFileSize(file.size)}</div></div>
                    <button onclick="removeFile(${i})" style="background:none;border:none;cursor:pointer;color:#999;">✕</button>
                </div>
            `).join('');
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;
            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            const formData = new FormData();
            for (const file of selectedFiles) formData.append('files', file);
            try {
                const response = await fetch(API_BASE + '/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.code === 200) {
                    for (const result of data.results) {
                        if (result.success) {
                            addTaskToList(result.task_id, result.filename);
                            startPolling(result.task_id);
                        } else {
                            alert('上传失败: ' + result.filename + ' - ' + result.error);
                        }
                    }
                    selectedFiles = [];
                    renderFileList();
                } else {
                    alert('上传失败: ' + data.message);
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '开始上传';
            }
        });
        
        function addTaskToList(taskId, filename) {
            if (tasks[taskId]) return;
            tasks[taskId] = { id: taskId, name: filename, status: 'pending', doneList: [], runningList: [], logs: [] };
            renderTaskList();
        }
        
        function updateTaskStatus(taskId, data) {
            if (!tasks[taskId]) return;
            tasks[taskId].status = data.status;
            tasks[taskId].doneList = data.done_list || [];
            tasks[taskId].runningList = data.running_list || [];
            if (data.done_list && data.done_list.length > tasks[taskId].logs.length) {
                const newLogs = data.done_list.slice(tasks[taskId].logs.length);
                for (const log of newLogs) tasks[taskId].logs.push({ time: new Date(), message: '✅ ' + log });
            }
            if (data.running_list && data.running_list.length > 0) {
                tasks[taskId].logs.push({ time: new Date(), message: '🔄 正在执行: ' + data.running_list[0] });
            }
            renderTaskList();
            if (data.status === 'completed' || data.status === 'failed') stopPolling(taskId);
        }
        
        function renderTaskList() {
            const taskArray = Object.values(tasks);
            if (taskArray.length === 0) { taskList.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无任务</div>'; return; }
            taskList.innerHTML = taskArray.map(task => `
                <div class="task-item">
                    <div class="task-header"><span class="task-name">${escapeHtml(task.name)}</span><span class="task-status status-${task.status}">${getStatusText(task.status)}</span></div>
                    <div class="task-progress">已完成: ${task.doneList.length} 个步骤</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, task.doneList.length * 12)}%"></div></div>
                    <div class="log-panel" id="log-${task.id}">${task.logs.slice(-10).map(log => '<div class="log-line"><span class="log-time">' + formatTime(log.time) + '</span><span>' + escapeHtml(log.message) + '</span></div>').join('')}</div>
                    <button onclick="toggleLog('${task.id}')" style="margin-top:10px;padding:5px 10px;font-size:12px;">查看日志</button>
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const map = { 'pending': '等待中', 'processing': '处理中', 'completed': '已完成', 'failed': '失败' };
            return map[status] || status;
        }
        
        function toggleLog(taskId) {
            const panel = document.getElementById('log-' + taskId);
            if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
        
        function startPolling(taskId) {
            if (pollingIntervals[taskId]) return;
            pollingIntervals[taskId] = setInterval(async () => {
                try {
                    const response = await fetch(API_BASE + '/status/' + taskId);
                    if (response.ok) {
                        const data = await response.json();
                        updateTaskStatus(taskId, data);
                        if (data.status === 'completed' || data.status === 'failed') stopPolling(taskId);
                    }
                } catch (error) { console.error('轮询失败:', error); }
            }, 2000);
        }
        
        function stopPolling(taskId) {
            if (pollingIntervals[taskId]) { clearInterval(pollingIntervals[taskId]); delete pollingIntervals[taskId]; }
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function formatTime(date) { return date.toLocaleTimeString(); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    </script>
</body>
</html>
